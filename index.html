<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🏪 Sonu General Store </title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">

<div class="logo">
<h1>🏪 Sonu General Store </h1>
<p>Fresh General & Grocery Store</p>
</div>

<div class="top-right">

<button id="cart-count" class="cart-top-btn" onclick="openCart()">
🛒 Cart (0)
</button>


</div>

</header>

<div class="search-box">

<input
type="text"
id="search"
placeholder="🔍 सामान खोजें...">

</div>


<h2 class="category-title">📂 Categories</h2>

<div class="categories" id="categories">
</div>

<div class="products">
  <div id="product-list">

</div>

</div>

<footer class="footer">

<p>© 2026 Sonu Ki Dukaan</p>

<p>📍 Bachhauta, Khagaria, Bihar</p>

<div class="footer-buttons">

<input type="text" id="customerName" placeholder="👤 अपना नाम">

<input type="tel" id="customerPhone" placeholder="📞 मोबाइल नंबर">

<textarea id="customerAddress" placeholder="📍 पूरा पता"></textarea>
<button class="whatsapp-order" onclick="sendWhatsApp()">
📦 WhatsApp पर ऑर्डर भेजें
</button>

<a href="https://wa.me/918051707285" class="whatsapp-btn">
💬 WhatsApp पर संपर्क करें
</a>

<a href="admin.html" class="admin-btn">
⚙️ Admin Panel
</a>

</div>

</footer>

<script type="module" src="script.js"></script>

</body>
</html>
